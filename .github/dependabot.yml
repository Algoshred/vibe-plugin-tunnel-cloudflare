version: 2
registries:
  burdenoff-verdaccio:
    type: "npm-registry"
    url: "https://verdaccio.tooling.internal.burdenoff.com"
    username: "ci-publisher"
    password: "${{secrets.VERDACCIO_CI_PASSWORD}}"
    replaces-base: true
updates:
  - package-ecosystem: "bun"
    directory: "/"
    registries:
      - burdenoff-verdaccio
    schedule:
      interval: "weekly"
      day: "monday"
      time: "04:00"
      timezone: "Asia/Kolkata"
    open-pull-requests-limit: 10
    rebase-strategy: "auto"
    commit-message:
      prefix: "deps"
      include: "scope"
    groups:
      bun-minor-patch:
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "04:00"
      timezone: "Asia/Kolkata"
    open-pull-requests-limit: 10
    rebase-strategy: "auto"
    commit-message:
      prefix: "ci"
      include: "scope"
    groups:
      github-actions-minor-patch:
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"
