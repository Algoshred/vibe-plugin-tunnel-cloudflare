name: Reviewer Lottery

on:
  pull_request_target:
    types: [opened, ready_for_review, reopened]

jobs:
  assign-reviewers:
    name: Assign Reviewers
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: uesteibar/reviewer-lottery@v4
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
