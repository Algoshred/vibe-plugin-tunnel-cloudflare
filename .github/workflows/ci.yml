# CI — Test, build, publish to Verdaccio (internal, every push to main)
#
# Every push to main: test → build → CalVer version → publish to Verdaccio (private)
# PRs: test + build only (no publish)
#
# CalVer: YYYY.MDD.PATCH (semver-compatible, no zero-padding)
# Verdaccio: @vibecontrols/vibe-plugin-* (private, restricted access)

name: CI

on:
  push:
    branches: [main]
    paths-ignore:
      - "**.md"
      - "docs/**"
      - "LICENSE"
      - ".gitignore"
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Test & Build
    runs-on: org-runners
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: .bun-version

      - name: Install dependencies
        run: bun install

      - name: Lint
        run: bun run lint

      - name: Type check
        run: bun run type:check

      - name: Build
        run: bun run build

  publish-verdaccio:
    name: Publish to Verdaccio
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: org-runners
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: .bun-version

      - name: Install dependencies
        run: bun install

      - name: Build
        run: bun run build

      - name: Pre-cache npm CLI
        run: bunx npm@latest --version

      - name: Compute CalVer version
        id: version
        run: |
          NAME=$(bun -e "console.log(require('./package.json').name)")
          ENCODED_NAME=$(echo "$NAME" | sed 's|/|%2f|g')
          YYYY=$(date -u '+%Y')
          MDD=$((10#$(date -u '+%m%d')))
          DATE_PREFIX="${YYYY}.${MDD}"

          AUTH=$(echo -n "ci-publisher:${{ secrets.VERDACCIO_CI_PASSWORD }}" | base64)
          EXISTING=$(curl -sf -H "Authorization: Basic ${AUTH}" \
            "https://verdaccio.tooling.internal.burdenoff.com/${ENCODED_NAME}" \
            2>/dev/null | jq -r '.versions | keys[]? // empty' \
            | grep -E "^${DATE_PREFIX}\.[0-9]+$" | sort -t. -k3 -n || true)

          MAX_PATCH=$(echo "$EXISTING" | tail -1 | cut -d. -f3)
          NEXT_PATCH=$(( ${MAX_PATCH:-0} + 1 ))
          VERSION="${DATE_PREFIX}.${NEXT_PATCH}"

          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Publishing: $NAME@$VERSION"

      - name: Publish to Verdaccio
        run: |
          VERDACCIO_URL="https://verdaccio.tooling.internal.burdenoff.com/"
          AUTH=$(echo -n "ci-publisher:${{ secrets.VERDACCIO_CI_PASSWORD }}" | base64)
          cat > .npmrc << NPMRC
          registry=${VERDACCIO_URL}
          //verdaccio.tooling.internal.burdenoff.com/:_auth=${AUTH}
          NPMRC
          sed -i 's/^ *//' .npmrc
          bunx npm@latest version "${{ steps.version.outputs.version }}" --no-git-tag-version --allow-same-version
          bunx npm@latest publish --registry "${VERDACCIO_URL}" --tag latest --access restricted --ignore-scripts

      - name: Summary
        if: always()
        run: |
          NAME=$(bun -e "console.log(require('./package.json').name)")
          echo "### Published to Verdaccio" >> $GITHUB_STEP_SUMMARY
          echo "**Package**: \`${NAME}@${{ steps.version.outputs.version }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**Registry**: Verdaccio (private)" >> $GITHUB_STEP_SUMMARY
